services:
  postgres:
    image: postgres:17
    container_name: alpha_chat_db

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: alpha_chat

    ports:
      - "5432:5432"

    volumes:
      - ./schemas/dump.sql:/docker-entrypoint-initdb.d/dump.sql
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: alpha_chat_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --user admin on >123456 allcommands allkeys

volumes:
  postgres_data:
  redis_data:
